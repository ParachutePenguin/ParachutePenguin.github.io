# 公開するページのURL
baseURL = "https://ParachutePenguin.github.io/"

languageCode = "ja"
DefaultContentLanguage = "ja"
HasCJKLanguage = true
enableRobotsTXT = true

# ブログのタイトル
title = "hugo-blog-template"

theme = "mainroad"
paginate = 20

# 自己紹介
[Author]
    name = "ParachutePenguin"
    bio = "ヘリから突き落とされたペンギンさん。"
    avatar = "img/avatar.png"

[Params]
    customCSS = ["css/custom.css"]
    copyright = "Author"
    readmore = true
    authorbox = true
    post_meta = ["date", "categories"]
    twitter_cards = true

# ページのテーマカラー
[Params.style.vars]
  highlightColor = "#f0ffff"

# SNS等のユーザー名
[Params.widgets.social]
  github = "ParachutePenguin"

[Params.sidebar]
    home = "right"
    list = "right"
    single = "right"
    widgets = ["search", "recent", "categories", "taglist", "social"]

